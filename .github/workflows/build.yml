name: HIRA Data Refresh & Deploy

on:
  schedule:
    - cron: '0 16 * * *'  # 매일 KST 01:00 (UTC 16:00 전날)
  push:
    branches: [main]
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (fetch HIRA data + generate pages)
        run: node scripts/build.js
        env:
          HIRA_API_KEY: ${{ secrets.HIRA_API_KEY }}

      - name: Prepare Pages output (_site)
        run: |
          mkdir -p _site
          cp -r dental articles index.html style.css article.css robots.txt llms.txt sitemap.xml _site/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
