name: HIRA Data Refresh & Deploy

on:
  schedule:
    - cron: '0 16 * * *'  # 매일 KST 01:00 (UTC 16:00 전날)
  push:
    branches: [main]
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (fetch HIRA data + generate pages)
        run: node scripts/build.js
        env:
          HIRA_API_KEY: ${{ secrets.HIRA_API_KEY }}

      - name: 가격지수 스냅샷 커밋 (시계열 보존)
        run: |
          git config user.name "index-bot"
          git config user.email "actions@github.com"
          git add price-index/data/ price-index/index.html price-index/20* press/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "스냅샷 변경 없음"
          else
            git commit -m "data: 가격지수 스냅샷 갱신"
            git pull --rebase --autostash origin main
            git push origin main
          fi

      - name: Prepare Pages output (_site)
        run: |
          mkdir -p _site
          cp -r dental articles clinics find local price-index admin index.html style.css article.css robots.txt llms.txt sitemap.xml 01641d0d88be2025b555e6f89832ade7.txt CNAME google3af8fc82b6aafb48.html naverd26696efe8be7eb349287c5c94270e80.html _site/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: IndexNow 제출 (Bing·네이버 자동 색인 통지)
        run: node scripts/submit-indexnow.js
